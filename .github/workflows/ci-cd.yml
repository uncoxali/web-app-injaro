name: CI/CD

on:
  pull_request:
    branches: [main, stage]
  push:
    branches: [main, stage]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE || '/api' }}
  API_PROXY_TARGET: ${{ vars.API_PROXY_TARGET || vars.NEXT_PUBLIC_API_URL_PROD || 'https://api.injaro.info' }}
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://app.injaro.info' }}
  NEXT_PUBLIC_LANDING_URL: ${{ vars.NEXT_PUBLIC_LANDING_URL || 'https://injaro.info' }}
  NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
  NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_BASE: ${{ env.NEXT_PUBLIC_API_BASE }}
          API_PROXY_TARGET: ${{ env.API_PROXY_TARGET }}
          NEXT_PUBLIC_SITE_URL: ${{ env.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_LANDING_URL: ${{ env.NEXT_PUBLIC_LANDING_URL }}
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ env.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          NEXT_PUBLIC_GA_ID: ${{ env.NEXT_PUBLIC_GA_ID }}

  build-image:
    name: Build Docker Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: quality
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: injaro/injaro-landing:${{ github.ref_name }}
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ env.NEXT_PUBLIC_API_BASE }}
            API_PROXY_TARGET=${{ env.API_PROXY_TARGET }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_LANDING_URL=${{ env.NEXT_PUBLIC_LANDING_URL }}
            NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
            NEXT_PUBLIC_GA_ID=${{ env.NEXT_PUBLIC_GA_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-image
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare server directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            echo "${{ secrets.DEPLOY_SSH_PASSWORD }}" | sudo -S mkdir -p "$APP_DIR"
            echo "${{ secrets.DEPLOY_SSH_PASSWORD }}" | sudo -S chown -R ${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }} "$APP_DIR"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_APP_DIR }}
          overwrite: true

      - name: Start container on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 10m
          script_stop: true
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            BRANCH="${{ github.ref_name }}"

            cd "$APP_DIR"
            ls -lah

            export PORT="${{ github.ref_name == 'main' && vars.PORT_PROD || vars.PORT_STAGING || '5000' }}"
            export TAG="${{ github.ref_name }}"
            export API_PROXY_TARGET="${{ vars.API_PROXY_TARGET || vars.NEXT_PUBLIC_API_URL_PROD || 'https://api.injaro.info' }}"
            export NEXT_PUBLIC_API_BASE="${{ vars.NEXT_PUBLIC_API_BASE || '/api' }}"
            export NEXT_PUBLIC_SITE_URL="${{ vars.NEXT_PUBLIC_SITE_URL || 'https://app.injaro.info' }}"
            export NEXT_PUBLIC_LANDING_URL="${{ vars.NEXT_PUBLIC_LANDING_URL || 'https://injaro.info' }}"
            export NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN="${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}"
            export NEXT_PUBLIC_GA_ID="${{ vars.NEXT_PUBLIC_GA_ID || '' }}"

            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            echo "Deployed $BRANCH successfully"
